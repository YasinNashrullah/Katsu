<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyalty Poin - Katsu Kantin Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loyalty.css">
</head>
<body>
    <div class="mobile-app-container">
        <!-- Header -->
        <header class="mobile-header" style="justify-content: center;">
            <h1>Katsu<span>Poin</span></h1>
        </header>

        <main class="m-loyalty-content">
            <!-- Points Display -->
            <div class="m-point-card">
                <h2>Poin Saya</h2>
                <div class="m-point-val">420</div>
                <div class="m-point-progress">
                    <div class="m-progress-fill" style="width: 84%;"></div>
                </div>
                <div class="m-point-desc">80 poin lagi untuk mendapatkan Katsu Gratis!</div>
            </div>

            <!-- Rewards Catalog -->
            <div class="m-rewards-header">
                <h3>Tukar Hadiah</h3>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Riwayat ❯</span>
            </div>

            <div class="m-reward-list">
                <!-- Reward 1 -->
                <div class="m-reward-item">
                    <div class="m-reward-icon">🥤</div>
                    <div class="m-reward-details">
                        <h4>Es Teh Manis</h4>
                        <p>100 Poin</p>
                    </div>
                    <button class="btn btn-outline m-claim-btn" style="color: var(--primary-color); border-color: var(--primary-color);">Tukar</button>
                </div>

                <!-- Reward 2 -->
                <div class="m-reward-item">
                    <div class="m-reward-icon">🍟</div>
                    <div class="m-reward-details">
                        <h4>Kentang Goreng</h4>
                        <p>250 Poin</p>
                    </div>
                    <button class="btn btn-outline m-claim-btn" style="color: var(--primary-color); border-color: var(--primary-color);">Tukar</button>
                </div>

                <!-- Reward 3 (Disabled) -->
                <div class="m-reward-item" style="opacity: 0.6;">
                    <div class="m-reward-icon" style="background: var(--bg-main); color: var(--text-muted);">🍱</div>
                    <div class="m-reward-details">
                        <h4>Katsu Original Gratis</h4>
                        <p>500 Poin</p>
                    </div>
                    <button class="btn btn-outline m-claim-btn" disabled style="background: var(--bg-main); color: var(--text-muted); border-color: var(--border-color);">Kurang</button>
                </div>
            </div>
            
            <div style="background: white; border: 1px dashed var(--border-color); border-radius: var(--radius-md); padding: 16px; margin-top: 24px; text-align: center;">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px;">Tunjukkan QR Code ini ke kasir untuk menambah poin.</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=KATSU-USER-0895" alt="QR Code User" style="width: 120px; height: 120px; opacity: 0.8;">
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="beranda.html" class="nav-item">
                <span class="icon">🏠</span>
                <span class="label">Beranda</span>
            </a>
            <a href="menu.html" class="nav-item">
                <span class="icon">🍱</span>
                <span class="label">Menu</span>
            </a>
            <a href="preorder.html" class="nav-item">
                <span class="icon">⏰</span>
                <span class="label">Jadwal</span>
            </a>
            <a href="tracker.html" class="nav-item">
                <span class="icon">📦</span>
                <span class="label">Pesanan</span>
            </a>
            <a href="loyalty.html" class="nav-item active">
                <span class="icon">⭐</span>
                <span class="label">Poin</span>
            </a>
        </nav>
    </div>
</body>
</html>
