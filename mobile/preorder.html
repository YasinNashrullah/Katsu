<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jadwal Pre-Order - Katsu Kantin Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="preorder.css">
</head>
<body>
    <div class="mobile-app-container">
        <!-- Header -->
        <header class="mobile-header" style="justify-content: center;">
            <h1>Jadwal<span>Pre-Order</span></h1>
        </header>

        <main class="m-preorder-content">
            <div class="m-date-picker">
                <button>❮</button>
                <span>Hari Ini</span>
                <button>❯</button>
            </div>

            <div class="m-slot-list">
                <!-- Slot 1 -->
                <div class="m-slot full">
                    <div class="m-slot-time">09:45</div>
                    <div class="m-slot-status">Penuh</div>
                </div>
                <!-- Slot 2 -->
                <div class="m-slot full">
                    <div class="m-slot-time">10:45</div>
                    <div class="m-slot-status">Penuh</div>
                </div>
                <!-- Slot 3 -->
                <div class="m-slot available">
                    <div class="m-slot-time">11:45</div>
                    <div class="m-slot-status">Tersedia</div>
                </div>
                <!-- Slot 4 -->
                <div class="m-slot available">
                    <div class="m-slot-time">12:45</div>
                    <div class="m-slot-status">Tersedia</div>
                </div>
                <!-- Slot 5 -->
                <div class="m-slot available">
                    <div class="m-slot-time">13:45</div>
                    <div class="m-slot-status">Tersedia</div>
                </div>
                <!-- Slot 6 -->
                <div class="m-slot available">
                    <div class="m-slot-time">14:45</div>
                    <div class="m-slot-status">Tersedia</div>
                </div>
            </div>
            
            <p style="text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-muted);">
                Waktu yang tersedia dapat dipilih saat <strong>Checkout</strong>.
            </p>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="beranda.html" class="nav-item">
                <span class="icon">🏠</span>
                <span class="label">Beranda</span>
            </a>
            <a href="menu.html" class="nav-item">
                <span class="icon">🍱</span>
                <span class="label">Menu</span>
            </a>
            <a href="preorder.html" class="nav-item active">
                <span class="icon">⏰</span>
                <span class="label">Jadwal</span>
            </a>
            <a href="tracker.html" class="nav-item">
                <span class="icon">📦</span>
                <span class="label">Pesanan</span>
            </a>
            <a href="loyalty.html" class="nav-item">
                <span class="icon">⭐</span>
                <span class="label">Poin</span>
            </a>
        </nav>
    </div>
</body>
</html>
